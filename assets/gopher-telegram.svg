<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <!-- Grid: 40px modular grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    </pattern>

    <!-- clip for the notifications card so inner blocks never overflow -->
    <clipPath id="notifClip">
      <rect x="0" y="0" width="192" height="176" rx="20" />
    </clipPath>

    <!-- geometric cloud: union of circles + base, clipped to keep clean edges -->
    <clipPath id="cloudClip">
      <rect x="0" y="0" width="240" height="240" rx="24" />
    </clipPath>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)" opacity="0.35"/>

  <!-- Left icon: geometric cloud (clean edges) -->
  <!-- Icon group box: 240x240 positioned at (40,40) -->
  <g transform="translate(40 40)" filter="url(#shadow)" clip-path="url(#cloudClip)">
    <g fill="rgba(224,242,254,0.96)">
      <!-- base -->
      <rect x="56" y="126" width="132" height="64" rx="32" />
      <!-- puffs -->
      <circle cx="92" cy="132" r="34" />
      <circle cx="132" cy="118" r="44" />
      <circle cx="172" cy="134" r="32" />
    </g>
  </g>

  <!-- Right icon: notifications list (geometric, snapped to integers) -->
  <!-- Icon group box: 240x240 positioned at (920,40) -->
  <g transform="translate(920 40)" filter="url(#shadow)">
    <!-- card: 192x176 centered in 240x240 => (24,32) -->
    <g transform="translate(24 32)">
      <rect x="0" y="0" width="192" height="176" rx="20" fill="rgba(224,242,254,0.96)"/>

      <g clip-path="url(#notifClip)">
        <!-- Inner padding: 24px, inner width=144 -->
        <!-- Row rhythm: 4 rows, step=32px -->
        <g transform="translate(24 28)">
          <!-- constants:
               dot r=8, dot center x=10
               bar x=30, bar h=12, bar rx=6
               max bar width = 144 - 30 = 114
          -->

          <!-- row 1 -->
          <circle cx="10" cy="8" r="8" fill="#22c55e"/>
          <rect x="30" y="2" width="110" height="12" rx="6" fill="rgba(147,197,253,0.95)"/>

          <!-- row 2 -->
          <circle cx="10" cy="40" r="8" fill="#f59e0b"/>
          <rect x="30" y="34" width="114" height="12" rx="6" fill="rgba(147,197,253,0.95)"/>

          <!-- row 3 -->
          <circle cx="10" cy="72" r="8" fill="#ef4444"/>
          <rect x="30" y="66" width="98" height="12" rx="6" fill="rgba(147,197,253,0.95)"/>

          <!-- row 4 -->
          <circle cx="10" cy="104" r="8" fill="#3b82f6"/>
          <rect x="30" y="98" width="106" height="12" rx="6" fill="rgba(147,197,253,0.95)"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Text, snapped to grid -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#fff">
    <text x="320" y="140" font-size="44" font-weight="800">telegram-notify-service</text>
    <text x="320" y="190" font-size="22" opacity="0.92">Tiny HTTP service (Go) to send notifications to Telegram</text>

    <!-- tags: same width, centered labels; baseline aligned -->
    <g transform="translate(320 220)" opacity="0.95" font-size="16" font-weight="700">
      <g>
        <rect x="0" y="0" rx="10" ry="10" width="140" height="34" fill="rgba(255,255,255,0.16)"/>
        <text x="70" y="23" text-anchor="middle">Go</text>
      </g>
      <g transform="translate(160 0)">
        <rect x="0" y="0" rx="10" ry="10" width="140" height="34" fill="rgba(255,255,255,0.16)"/>
        <text x="70" y="23" text-anchor="middle">Fast</text>
      </g>
      <g transform="translate(320 0)">
        <rect x="0" y="0" rx="10" ry="10" width="140" height="34" fill="rgba(255,255,255,0.16)"/>
        <text x="70" y="23" text-anchor="middle">Token auth</text>
      </g>
    </g>
  </g>
</svg>
