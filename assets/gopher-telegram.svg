<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)" opacity="0.35"/>

  <!-- left: Go gopher-ish head (simple, not a smiley) -->
  <g transform="translate(80 66)" filter="url(#shadow)">
    <!-- head -->
    <circle cx="94" cy="94" r="88" fill="#7dd3fc"/>

    <!-- ears -->
    <circle cx="32" cy="72" r="26" fill="#7dd3fc"/>
    <circle cx="156" cy="72" r="26" fill="#7dd3fc"/>

    <!-- eyes -->
    <circle cx="62" cy="90" r="18" fill="#fff" opacity="0.95"/>
    <circle cx="126" cy="90" r="18" fill="#fff" opacity="0.95"/>
    <circle cx="62" cy="90" r="8" fill="#0f172a"/>
    <circle cx="126" cy="90" r="8" fill="#0f172a"/>

    <!-- little snout -->
    <ellipse cx="94" cy="132" rx="26" ry="18" fill="#e0f2fe"/>
    <circle cx="86" cy="128" r="4" fill="#0f172a" opacity="0.75"/>
    <circle cx="102" cy="128" r="4" fill="#0f172a" opacity="0.75"/>
  </g>

  <!-- right: telegram-ish paper plane -->
  <g transform="translate(1000 110)" filter="url(#shadow)">
    <path d="M0 55 L150 0 L122 154 L74 110 L40 144 L34 104 L0 55 Z" fill="#e0f2fe"/>
    <path d="M74 110 L122 154" stroke="#93c5fd" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- text -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#fff">
    <text x="300" y="140" font-size="44" font-weight="800">telegram-notify-service</text>
    <text x="300" y="190" font-size="22" opacity="0.92">Tiny HTTP service (Go) to send notifications to Telegram</text>

    <g transform="translate(300 220)" opacity="0.95">
      <rect x="0" y="0" rx="10" ry="10" width="86" height="34" fill="rgba(255,255,255,0.16)"/>
      <text x="18" y="24" font-size="16" font-weight="700">Go</text>
      <rect x="100" y="0" rx="10" ry="10" width="110" height="34" fill="rgba(255,255,255,0.16)"/>
      <text x="118" y="24" font-size="16" font-weight="700">Fast</text>
      <rect x="224" y="0" rx="10" ry="10" width="150" height="34" fill="rgba(255,255,255,0.16)"/>
      <text x="242" y="24" font-size="16" font-weight="700">Token auth</text>
    </g>
  </g>
</svg>
